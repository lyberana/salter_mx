version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://salter:salter_dev_pass@postgres:5432/salter_dev
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: salter_dev
      POSTGRES_USER: salter
      POSTGRES_PASSWORD: salter_dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: salter_test
      POSTGRES_USER: salter
      POSTGRES_PASSWORD: salter_test_pass

volumes:
  postgres_data:
